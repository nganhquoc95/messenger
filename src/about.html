<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About Messenger</title>
    <style>
        :root {
            --primary-color: #0084ff;
            --bg-color: rgba(20, 20, 20, 0.85);
            --text-color: #ffffff;
            --secondary-text: #b0b3b8;
            --border-color: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: transparent;
            color: var(--text-color);
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            width: 100%;
            height: 100%;
            background: var(--bg-color);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            -webkit-app-region: drag;
        }

        .logo {
            width: 80px;
            height: 80px;
            margin-bottom: 20px;
            filter: drop-shadow(0 0 15px rgba(0, 132, 255, 0.5));
            animation: pulse 2s infinite ease-in-out;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        h1 {
            font-size: 24px;
            margin: 0;
            font-weight: 600;
            background: linear-gradient(135deg, #00c6ff, #0072ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .version {
            font-size: 14px;
            color: var(--secondary-text);
            margin: 8px 0 20px;
            padding: 4px 12px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            border: 1px solid var(--border-color);
        }

        .description {
            font-size: 14px;
            line-height: 1.6;
            color: var(--secondary-text);
            max-width: 300px;
            margin-bottom: 30px;
        }

        .links {
            display: flex;
            gap: 15px;
            -webkit-app-region: no-drag;
        }

        button {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-color);
            color: white;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 8px;
            -webkit-app-region: no-drag;
            pointer-events: auto;
        }

        button:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-2px);
            border-color: var(--primary-color);
        }

        .close-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            background: none;
            border: none;
            color: var(--secondary-text);
            font-size: 20px;
            cursor: pointer;
            padding: 5px;
            line-height: 1;
            -webkit-app-region: no-drag;
        }

        .close-btn:hover {
            color: white;
            transform: scale(1.1);
        }
    </style>
</head>
<body>
    <div class="container">
        <button class="close-btn" id="closeBtn">&times;</button>
        <img src="../assets/icon.png" alt="Logo" class="logo">
        <h1>Messenger</h1>
        <div class="version" id="versionText">Version 1.0.0</div>
        <p class="description">
            A premium desktop experience for Facebook Messenger, optimized for performance and productivity.
        </p>
        <div class="links">
            <button id="githubBtn">
                <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"></path></svg>
                GitHub
            </button>
        </div>
    </div>
    <script>
        const versionText = document.getElementById('versionText');
        const githubBtn = document.getElementById('githubBtn');
        const closeBtn = document.getElementById('closeBtn');

        window.electronAPI.onVersion((version) => {
            versionText.innerText = `Version ${version}`;
        });

        githubBtn.onclick = () => {
            window.electronAPI.openExternal('https://github.com/nganhquoc95/messenger');
        };

        closeBtn.onclick = () => {
            window.close();
        };
    </script>
</body>
</html>
